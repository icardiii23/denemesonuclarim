<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>LGS Deneme Takip</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    input, button { margin: 5px 0; padding: 8px; width: 100%; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
    th { background-color: #f0f0f0; }
  </style>
</head>
<body>
  <h1>LGS Deneme Takip</h1>
  <form id="denemeForm">
     <input type="text" placeholder="Deneme Adı" name="deneme" required>
    <input type="date" name="tarih" required>
<input type="number" step="any" placeholder="Türkçe Net" name="turkce" required>
<input type="number" step="any" placeholder="İnkılap Net" name="inkilap" required>
<input type="number" step="any" placeholder="Din Net" name="din" required>
<input type="number" step="any" placeholder="İngilizce Net" name="ingilizce" required>
<input type="number" step="any" placeholder="Matematik Net" name="matematik" required>
<input type="number" step="any" placeholder="Fen Net" name="fen" required>
    <input type="number" step="any" placeholder="Puan" name="puan" required>

    <button type="submit">Kaydet</button>
  </form>

  <table id="dataTable">
    <thead>
      <tr>
        <th>Tarih</th><th>Deneme</th><th>Türkçe</th><th>İnkılap</th><th>Din</th><th>İngilizce</th><th>Matematik</th><th>Fen</th><th>Puan</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

   <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyAsu4sxIYVkQtBpdBKa8GS_CfTz1KajKju-JpV6kfRBf6oKrZtPHZk0AvHStPfY-NiEw/exec";

    document.getElementById("denemeForm").addEventListener("submit", e => {
      e.preventDefault();
      const form = new FormData(e.target);

      fetch(scriptURL, {
        method: 'POST',
        body: form
      })
      .then(response => {
        if (response.ok) {
          alert("Veri kaydedildi!");
          e.target.reset();
          loadData();
        } else {
          alert("Hata oluştu.");
        }
      })
      .catch(error => {
        console.error("Hata:", error);
        alert("Bir hata oluştu!");
      });
    });

    function loadData() {
      fetch(scriptURL)
        .then(res => res.json())
        .then(data => {
          const tbody = document.querySelector("#dataTable tbody");
          tbody.innerHTML = "";
          data.slice(1).forEach(row => {
            const tr = document.createElement("tr");
            row.forEach(cell => {
              const td = document.createElement("td");
              td.textContent = cell;
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
        });
    }

    loadData();
  </script>

</body>
</html>
